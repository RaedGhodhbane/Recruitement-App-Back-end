### PROD PROFILE ###

### DATABASE ###
spring.datasource.url=jdbc:mysql://production-host:3306/recruitmentApp?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=prod_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

### JPA / HIBERNATE ###
spring.jpa.show-sql=false

### SERVER ###
server.port=443
# En production, HTTPS est OBLIGATOIRE. Deux options :
# Option 1 : SSL direct dans Spring Boot (décommenter et configurer)
# server.ssl.enabled=true
# server.ssl.key-store=/etc/ssl/recruitmentapp/keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=recruitmentapp
# Option 2 : Terminaison TLS via reverse proxy (nginx, Apache, etc.)
#   → Dans ce cas, configurer le proxy pour envoyer X-Forwarded-Proto=https

### FILE UPLOADS ###
file.upload-dir=/var/data/recruitmentApp/images
cv.upload.dir=/var/data/recruitmentApp/cvs
